name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  LAMBDA_FUNCTION_NAME: fintracker-api

jobs:
  # ──────────────────────────────────────────────────
  # Job 0: Detect which parts of the codebase changed
  # ──────────────────────────────────────────────────
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      infra: ${{ steps.filter.outputs.infra }}
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      run_all: ${{ github.event_name == 'workflow_dispatch' }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            infra:
              - 'infra/**'
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

  # ──────────────────────────────────────────────────
  # Job 1: Terraform — only if infra/ changed or manual
  # ──────────────────────────────────────────────────
  terraform:
    name: Infrastructure (Terraform)
    needs: detect-changes
    if: needs.detect-changes.outputs.infra == 'true' || needs.detect-changes.outputs.run_all == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Create placeholder Lambda zip
        run: |
          cd backend
          mkdir -p package
          echo "def handler(event, context): return {'statusCode': 200, 'body': 'placeholder'}" > package/lambda_handler.py
          cd package && zip -r ../lambda.zip . && cd ..
          rm -rf package

      - name: Terraform Init
        run: cd infra && terraform init -input=false

      - name: Terraform Plan
        run: cd infra && terraform plan -input=false -out=tfplan

      - name: Terraform Apply
        run: cd infra && terraform apply -input=false -auto-approve tfplan

  # ──────────────────────────────────────────────────
  # Job 2: Backend — only if backend/ changed or manual
  # ──────────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend
    needs: [detect-changes, terraform]
    if: |
      always() &&
      (needs.detect-changes.outputs.backend == 'true' || needs.detect-changes.outputs.run_all == 'true') &&
      (needs.terraform.result == 'success' || needs.terraform.result == 'skipped')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install dependencies into package
        run: |
          cd backend
          pip install -r requirements.txt -t package/
          cp -r app/ package/app/
          cp lambda_handler.py package/

      - name: Create deployment package
        run: cd backend/package && zip -r ../lambda.zip .

      - name: Deploy to Lambda
        run: |
          aws lambda update-function-code \
            --function-name ${{ env.LAMBDA_FUNCTION_NAME }} \
            --zip-file fileb://backend/lambda.zip

      - name: Wait for function update
        run: |
          aws lambda wait function-updated \
            --function-name ${{ env.LAMBDA_FUNCTION_NAME }}

      - name: Update LLM environment variables
        run: |
          # Get existing env vars (preserves JWT_SECRET and Terraform-managed vars)
          EXISTING=$(aws lambda get-function-configuration \
            --function-name ${{ env.LAMBDA_FUNCTION_NAME }} \
            --query 'Environment.Variables' --output json)

          # Merge in LLM secrets
          UPDATED=$(echo "$EXISTING" | python3 -c "
          import sys, json
          env = json.load(sys.stdin)
          env['LLM_API_KEY'] = '${{ secrets.LLM_API_KEY }}'
          env['LLM_PROVIDER'] = '${{ secrets.LLM_PROVIDER }}'
          print(json.dumps({'Variables': env}))
          ")

          aws lambda update-function-configuration \
            --function-name ${{ env.LAMBDA_FUNCTION_NAME }} \
            --environment "$UPDATED"

  # ──────────────────────────────────────────────────
  # Job 3: Frontend — only if frontend/ changed or manual
  # ──────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend
    needs: [detect-changes, terraform]
    if: |
      always() &&
      (needs.detect-changes.outputs.frontend == 'true' || needs.detect-changes.outputs.run_all == 'true') &&
      (needs.terraform.result == 'success' || needs.terraform.result == 'skipped')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Discover AWS resources
        id: aws
        run: |
          FRONTEND_BUCKET=$(aws s3api list-buckets \
            --query "Buckets[?starts_with(Name, 'fintracker-frontend-')].Name | [0]" \
            --output text)
          echo "frontend_bucket=$FRONTEND_BUCKET" >> $GITHUB_OUTPUT

          CLOUDFRONT_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Origins.Items[?starts_with(DomainName, 'fintracker-frontend-')]].Id | [0]" \
            --output text)
          echo "cloudfront_id=$CLOUDFRONT_ID" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Build
        run: cd frontend && npm run build

      - name: Deploy to S3
        run: |
          aws s3 sync frontend/dist/ s3://${{ steps.aws.outputs.frontend_bucket }}/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html"

          aws s3 cp frontend/dist/index.html s3://${{ steps.aws.outputs.frontend_bucket }}/index.html \
            --cache-control "public, max-age=0, must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.aws.outputs.cloudfront_id }} \
            --paths "/*"

  # ──────────────────────────────────────────────────
  # Job 4: Summary — always runs, shows deployment info
  # ──────────────────────────────────────────────────
  summary:
    name: Deployment Summary
    needs: [detect-changes, terraform, deploy-backend, deploy-frontend]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get deployment endpoints
        id: endpoints
        run: |
          # CloudFront domain
          CF_DOMAIN=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Origins.Items[?starts_with(DomainName, 'fintracker-frontend-')]].DomainName | [0]" \
            --output text 2>/dev/null || echo "not-deployed-yet")
          echo "cloudfront_domain=$CF_DOMAIN" >> $GITHUB_OUTPUT

          # API Gateway URL
          API_ID=$(aws apigatewayv2 get-apis \
            --query "Items[?Name=='fintracker-api'].ApiId | [0]" \
            --output text 2>/dev/null || echo "")
          if [ -n "$API_ID" ] && [ "$API_ID" != "None" ]; then
            echo "api_url=https://${API_ID}.execute-api.${{ env.AWS_REGION }}.amazonaws.com" >> $GITHUB_OUTPUT
          else
            echo "api_url=not-deployed-yet" >> $GITHUB_OUTPUT
          fi

      - name: Print summary
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║                   DEPLOYMENT SUMMARY                        ║"
          echo "╠══════════════════════════════════════════════════════════════╣"
          echo "║                                                              ║"
          echo "║  Infrastructure: ${{ needs.terraform.result }}"
          echo "║  Backend:        ${{ needs.deploy-backend.result }}"
          echo "║  Frontend:       ${{ needs.deploy-frontend.result }}"
          echo "║                                                              ║"
          echo "╠══════════════════════════════════════════════════════════════╣"
          echo "║  ENDPOINTS                                                   ║"
          echo "╠══════════════════════════════════════════════════════════════╣"
          echo "║                                                              ║"
          echo "║  App:     https://${{ steps.endpoints.outputs.cloudfront_domain }}"
          echo "║  API:     ${{ steps.endpoints.outputs.api_url }}"
          echo "║  Health:  https://${{ steps.endpoints.outputs.cloudfront_domain }}/api/health"
          echo "║                                                              ║"
          echo "╚══════════════════════════════════════════════════════════════╝"
          echo ""
