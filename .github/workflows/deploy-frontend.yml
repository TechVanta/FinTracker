name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Build & Deploy to S3/CloudFront
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Discover AWS resources
        id: aws
        run: |
          # Find the frontend S3 bucket by prefix
          FRONTEND_BUCKET=$(aws s3api list-buckets --query "Buckets[?starts_with(Name, 'fintracker-frontend-')].Name | [0]" --output text)
          echo "frontend_bucket=$FRONTEND_BUCKET" >> $GITHUB_OUTPUT

          # Find the CloudFront distribution by comment/origin matching the frontend bucket
          CLOUDFRONT_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Origins.Items[?starts_with(DomainName, 'fintracker-frontend-')]].Id | [0]" \
            --output text)
          echo "cloudfront_id=$CLOUDFRONT_ID" >> $GITHUB_OUTPUT

          # Get the API Gateway URL
          API_ID=$(aws apigatewayv2 get-apis --query "Items[?Name=='fintracker-api'].ApiId | [0]" --output text)
          API_URL="https://${API_ID}.execute-api.us-east-1.amazonaws.com"
          echo "api_url=$API_URL" >> $GITHUB_OUTPUT

          echo "Frontend bucket: $FRONTEND_BUCKET"
          echo "CloudFront ID: $CLOUDFRONT_ID"
          echo "API URL: $API_URL"

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Build
        run: |
          cd frontend
          VITE_API_URL=${{ steps.aws.outputs.api_url }} npm run build

      - name: Deploy to S3
        run: |
          aws s3 sync frontend/dist/ s3://${{ steps.aws.outputs.frontend_bucket }}/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html"

          aws s3 cp frontend/dist/index.html s3://${{ steps.aws.outputs.frontend_bucket }}/index.html \
            --cache-control "public, max-age=0, must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.aws.outputs.cloudfront_id }} \
            --paths "/*"
